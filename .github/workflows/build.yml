name: Build & Release Study Buddy

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v0.1.0, v1.0.0
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # macOS: install create-dmg for DMG bundling
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      # Linux: install system dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Study Buddy ${{ github.ref_name }}'
          releaseBody: |
            ## Study Buddy ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` or `.exe` installer
            - **macOS (M1/M2/M3/Intel via Rosetta 2)**: `.dmg` disk image
            - **Linux**: `.AppImage` or `.deb` package

            ### Installation
            - **Windows**: Download the `.msi` or `.exe` and run it
            - **macOS**: Download the `.dmg`, open it, and drag Study Buddy to Applications
            - **Linux**: Download the `.AppImage` (chmod +x, then run) or install the `.deb` with `sudo dpkg -i`

            > ⚠️ **macOS**: If you see *"app is damaged and can't be opened"*, open Terminal and run:
            > ```
            > xattr -cr /Applications/StudyB.app
            > ```
            > Then try again. This happens because the app isn't signed with an Apple Developer certificate.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
